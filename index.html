<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMX Image Compressor - Free Tool</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.container{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

input{
margin:10px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a68d1;
}

img{
max-width:100%;
margin-top:20px;
}

.stats{
margin-top:10px;
font-size:14px;
color:#444;
}

</style>
</head>

<body>

<div class="container">

<h1>IMX Image Compressor</h1>
<p>Free Online Image Compression Tool</p>

<input type="file" id="imageInput">

<br>

<label>Width:</label>
<input type="number" id="maxWidth" value="800">

<label>Height:</label>
<input type="number" id="maxHeight" value="600">

<br>

<label>Quality (0.1 - 1):</label>
<input type="number" step="0.1" id="quality" value="0.7">

<br><br>

<button onclick="compressImage()">Compress Image</button>

<div class="stats" id="stats"></div>

<img id="preview">

<br>

<a id="downloadBtn" download="compressed-image.jpg">
<button>Download Image</button>
</a>

</div>

<script>

let selectedFile;

document.getElementById("imageInput").addEventListener("change",(e)=>{
selectedFile = e.target.files[0];
});

function resizeImage(file,maxWidth,maxHeight,quality=0.8){

return new Promise((resolve,reject)=>{

const reader=new FileReader();
reader.readAsDataURL(file);

reader.onload=(event)=>{

const img=new Image();
img.src=event.target.result;

img.onload=()=>{

let width=img.width;
let height=img.height;

if(width>height){
if(width>maxWidth){
height*=maxWidth/width;
width=maxWidth;
}
}else{
if(height>maxHeight){
width*=maxHeight/height;
height=maxHeight;
}
}

const canvas=document.createElement("canvas");
canvas.width=width;
canvas.height=height;

const ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,width,height);

canvas.toBlob((blob)=>{
resolve(blob);
},file.type,quality);

};

};

reader.onerror=reject;

});

}

async function compressImage(){

if(!selectedFile){
alert("Please upload an image");
return;
}

const width=document.getElementById("maxWidth").value;
const height=document.getElementById("maxHeight").value;
const quality=document.getElementById("quality").value;

const resizedBlob=await resizeImage(selectedFile,width,height,quality);

const url=URL.createObjectURL(resizedBlob);

document.getElementById("preview").src=url;

document.getElementById("stats").innerText=
"Original: "+(selectedFile.size/1024).toFixed(2)+" KB | "+
"Compressed: "+(resizedBlob.size/1024).toFixed(2)+" KB";

document.getElementById("downloadBtn").href=url;

}

</script>

</body>
</html>
